server:
  port: ${PORT:8080}

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - http://localhost:4200
              - http://localhost:4201
              - https://medical-six-dun.vercel.app
              - https://medical-65ek7uigk-massgovindarajans-projects.vercel.app
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders:
              - "*"
            exposedHeaders:
              - Authorization
              - Content-Type
              - X-Total-Count
            allowCredentials: true
            maxAge: 3600

      routes:
        - id: auth-service
          uri: lb://MEDVAULT-BACKEND
          predicates:
            - Path=/api/auth/**

        - id: doctor-service
          uri: lb://MEDVAULT-BACKEND
          predicates:
            - Path=/api/doctors/**

        - id: admin-service
          uri: lb://MEDVAULT-BACKEND
          predicates:
            - Path=/api/admin/**

        - id: slots-service
          uri: lb://MEDVAULT-BACKEND
          predicates:
            - Path=/api/slots/**

        - id: pharmacy-service
          uri: lb://MEDVAULT-BACKEND
          predicates:
            - Path=/api/pharmacy/**

        - id: patient-service
          uri: lb://MEDVAULT-BACKEND
          predicates:
            - Path=/api/patients/**

        - id: medical-records-service
          uri: lb://MEDVAULT-BACKEND
          predicates:
            - Path=/api/records/**

        - id: appointment-service
          uri: lb://MEDVAULT-BACKEND
          predicates:
            - Path=/api/appointments/**

        - id: billing-service
          uri: lb://MEDVAULT-BACKEND
          predicates:
            - Path=/api/billing/**

        - id: payments-service
          uri: lb://MEDVAULT-BACKEND
          predicates:
            - Path=/api/payments/**

        - id: notifications-service
          uri: lb://MEDVAULT-BACKEND
          predicates:
            - Path=/api/notifications/**
          filters:
            - RemoveResponseHeader=Transfer-Encoding

        - id: queue-service
          uri: lb://MEDVAULT-BACKEND
          predicates:
            - Path=/api/queue/**

        - id: reports-service
          uri: lb://MEDVAULT-BACKEND
          predicates:
            - Path=/api/reports/**

        - id: ratings-service
          uri: lb://MEDVAULT-BACKEND
          predicates:
            - Path=/api/ratings/**

        - id: public-service
          uri: lb://MEDVAULT-BACKEND
          predicates:
            - Path=/api/public/**

        - id: uploads-service
          uri: lb://MEDVAULT-BACKEND
          predicates:
            - Path=/uploads/**
          filters:
            - AddResponseHeader=Cache-Control, max-age=3600

        - id: chat-service
          uri: lb:ws://MEDVAULT-BACKEND
          predicates:
            - Path=/api/chat/**

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE:http://eureka-server:8761/eureka/}
    fetch-registry: true
    register-with-eureka: true
    registry-fetch-interval-seconds: 30
    eureka-server-connect-timeout-seconds: 10
    eureka-server-read-timeout-seconds: 10
  instance:
    prefer-ip-address: false
    hostname: medvault-gateway
    non-secure-port: 8080
    instance-id: ${spring.application.name}:${server.port}
    health-check-url-path: /actuator/health
    lease-renewal-interval-in-seconds: 30
    lease-expiration-duration-in-seconds: 90

jwt:
  secret: ${JWT_SECRET:medvault_super_secret_key_2024_should_be_very_long_for_security}
  expiration: 86400000

management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - info
          - gateway
  endpoint:
    gateway:
      enabled: true
    health:
      show-details: always

logging:
  level:
    org.springframework.cloud.gateway: INFO
    org.springframework.security: WARN
    com.eureka_Gateway: INFO
    reactor.netty: WARN
